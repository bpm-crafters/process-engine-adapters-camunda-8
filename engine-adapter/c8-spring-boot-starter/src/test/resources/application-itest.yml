spring:
  application:
    name: ITest

camunda:
  client:
    auth:
      method: none
    mode: self-managed
    worker:
      defaults:
        enabled: true

dev:
  bpm-crafters:
    process-api:
      adapter:
        c8:
          enabled: true
          service-tasks:
            delivery-strategy: SUBSCRIPTION
            worker-id: execute-action-external
          user-tasks:
            type: native
            delivery-strategy: SCHEDULED
            schedule-delivery-fixed-rate-in-seconds: 10
